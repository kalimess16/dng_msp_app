group = "dev.fluttercommunity.android_id"
version = "1.0-SNAPSHOT"

buildscript {
    ext.kotlin_version = "2.2.20"
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.11.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

def resolveFlutterProperty = { String propertyName, Object fallback ->
    def flutterExtension = null

    if (project.hasProperty("flutter")) {
        flutterExtension = project.property("flutter")
    }

    if (flutterExtension == null) {
        flutterExtension = extensions.findByName("flutter")
    }

    if (flutterExtension != null && flutterExtension.hasProperty(propertyName)) {
        def value = flutterExtension."$propertyName"
        if (value != null) {
            return value
        }
    }

    return fallback
}

android {
    namespace = "dev.fluttercommunity.android_id"
    compileSdk = resolveFlutterProperty("compileSdkVersion", 36) as int

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = resolveFlutterProperty("minSdkVersion", 23) as int
    }

    dependencies {
        testImplementation("org.jetbrains.kotlin:kotlin-test")
        testImplementation("org.mockito:mockito-core:5.20.0")
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
                events "passed", "skipped", "failed", "standardOut", "standardError"
                outputs.upToDateWhen { false }
                showStandardStreams = true
            }
        }
    }
}
